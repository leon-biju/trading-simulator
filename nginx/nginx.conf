server {
    listen 80;
    server_name tradingsimulator.app www.tradingsimulator.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tradingsimulator.app www.tradingsimulator.app;

    ssl_certificate     /etc/letsencrypt/live/tradingsimulator.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradingsimulator.app/privkey.pem;

    location /static/ {
        alias /code/staticfiles/;
    }

    location /media/ {
        alias /code/media/;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}