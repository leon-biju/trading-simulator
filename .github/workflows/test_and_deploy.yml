name: Test then deploy on AWS EC2

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DEBUG: "True"
          TEST: "True"
          DJANGO_SECRET_KEY: "test-secret-key-not-for-production"
          DJANGO_ALLOWED_HOSTS: "localhost"
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          MARKET_DATA_MODE: simulation
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          CURRENCY_LAYER_API_KEY: "fake-key-for-tests"
        run: pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}::role/github-actions-deploy
          aws-region: us-east-1

      - name: Fetch SSH key and deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          aws ssm get-parameter \
            --name /deploy/ec2-ssh-key \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/deploy_key

          chmod 600 /tmp/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i /tmp/deploy_key \
              "ubuntu@${EC2_HOST}" \
              'bash -l /home/ubuntu/deploy.sh'

          rm -f /tmp/deploy_key